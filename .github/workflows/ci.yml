name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --all-extras --dev
          else
            uv venv
            uv pip install ruff pytest
          fi

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: |
          # Exit code 5 = "no tests collected" — expected until phase-1 tests land.
          uv run pytest -q || ([ $? -eq 5 ] && echo "No tests collected yet — skipping.")
